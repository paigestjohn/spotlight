<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Spotlight Investigation Flow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #07070a;
      --ink-2: #0c0c10;
      --paper: #ede8dc;
      --paper-2: #e3ddce;
      --paper-muted: rgba(237, 232, 220, 0.62);
      --paper-faint: rgba(237, 232, 220, 0.18);
      --warm: #c16a34;
      --cool: #346fa8;
      --green: #4a7d3f;
      --amber: #8a6212;
      --red: #a83838;
      --dark-text: #17140e;
      --dark-muted: rgba(23, 20, 14, 0.62);
    }

    * { box-sizing: border-box; }

    html,
    body {
      margin: 0;
      padding: 0;
      background: var(--ink);
      color: var(--paper);
      font-family: "Geist Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
    }

    .diagram {
      width: 100%;
      height: auto;
      display: block;
      background: var(--ink-2);
      border: 1px solid var(--paper-faint);
    }

    svg text {
      font-family: "Geist Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
    }

    .serif {
      font-family: "Fraunces", serif;
      font-weight: 500;
    }

    .eyebrow {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.14em;
      text-transform: uppercase;
    }

    .node-title {
      font-size: 22px;
      font-weight: 600;
    }

    .node-sub {
      font-size: 16px;
    }

    .small {
      font-size: 14px;
    }

    .callout {
      font-size: 13px;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <svg class="diagram" viewBox="0 0 1180 1660" role="img" aria-labelledby="ttl">
    <title id="ttl">Spotlight vertical flow with child skills and RLM details at the bottom.</title>

    <defs>
      <marker id="arrow-paper" markerWidth="13" markerHeight="13" refX="10" refY="6.5" orient="auto">
        <path d="M1,1 L11,6.5 L1,12 Z" fill="#ede8dc"></path>
      </marker>
      <marker id="arrow-warm" markerWidth="13" markerHeight="13" refX="10" refY="6.5" orient="auto">
        <path d="M1,1 L11,6.5 L1,12 Z" fill="#c16a34"></path>
      </marker>
      <marker id="arrow-cool" markerWidth="13" markerHeight="13" refX="10" refY="6.5" orient="auto">
        <path d="M1,1 L11,6.5 L1,12 Z" fill="#346fa8"></path>
      </marker>
      <marker id="arrow-amber" markerWidth="13" markerHeight="13" refX="10" refY="6.5" orient="auto">
        <path d="M1,1 L11,6.5 L1,12 Z" fill="#8a6212"></path>
      </marker>
    </defs>

    <rect x="0" y="0" width="1180" height="1660" fill="#0c0c10"></rect>

    <!-- Spine -->
    <g stroke="#ede8dc" stroke-width="3" fill="none">
      <path d="M590 88 L590 118" marker-end="url(#arrow-paper)"></path>
      <path d="M590 218 L590 248" marker-end="url(#arrow-paper)"></path>
      <path d="M590 330 L590 360" marker-end="url(#arrow-paper)"></path>
      <path d="M590 442 L590 472" marker-end="url(#arrow-paper)"></path>
      <path d="M590 528 L590 560" marker-end="url(#arrow-paper)"></path>
      <path d="M590 652 L590 682" marker-end="url(#arrow-paper)"></path>
      <path d="M590 746 L590 780" marker-end="url(#arrow-paper)"></path>
      <path d="M590 1136 L590 1168" marker-end="url(#arrow-paper)"></path>
      <path d="M590 1230 L590 1262" marker-end="url(#arrow-paper)"></path>
      <path d="M590 1324 L590 1356" marker-end="url(#arrow-paper)"></path>
    </g>

    <!-- Lead -->
    <rect x="440" y="36" width="300" height="52" rx="26" fill="#ede8dc" stroke="rgba(237,232,220,0.28)" stroke-width="2"></rect>
    <text x="590" y="68" text-anchor="middle" fill="#17140e" class="small" font-weight="600" letter-spacing="0.08em">LEAD · URL · DOCUMENT</text>

    <!-- Orchestrator -->
    <rect x="250" y="118" width="680" height="100" rx="8" fill="#07070a" stroke="#c16a34" stroke-width="3"></rect>
    <text x="590" y="151" text-anchor="middle" fill="#c16a34" class="eyebrow">ORCHESTRATOR</text>
    <text x="590" y="184" text-anchor="middle" fill="#fff5d9" class="serif" font-size="32">Spotlight</text>
    <text x="590" y="207" text-anchor="middle" fill="rgba(237,232,220,0.72)" class="node-sub">manages gates · spawns agents · validates artifacts</text>

    <!-- Phase 0 -->
    <rect x="250" y="248" width="680" height="82" rx="8" fill="#e3ddce" stroke="rgba(237,232,220,0.30)" stroke-width="2.5"></rect>
    <text x="590" y="280" text-anchor="middle" fill="#c16a34" class="eyebrow">PHASE 0 · PREFLIGHT</text>
    <text x="590" y="310" text-anchor="middle" fill="#17140e" class="node-title">Check tools and load skills (1)</text>

    <!-- Phase 1 -->
    <rect x="250" y="360" width="680" height="82" rx="8" fill="#e3ddce" stroke="rgba(237,232,220,0.30)" stroke-width="2.5"></rect>
    <text x="590" y="392" text-anchor="middle" fill="#c16a34" class="eyebrow">PHASE 1 · BRIEF</text>
    <text x="590" y="422" text-anchor="middle" fill="#17140e" class="node-title">Scope the lead with the user</text>

    <!-- Gate 1 -->
    <rect x="300" y="472" width="580" height="56" rx="8" fill="rgba(193,106,52,0.14)" stroke="#c16a34" stroke-width="2.5"></rect>
    <circle cx="332" cy="500" r="10" fill="none" stroke="#4a7d3f" stroke-width="2.5"></circle>
    <path d="M326 500 l4 4 l9 -10" fill="none" stroke="#4a7d3f" stroke-width="2.5"></path>
    <text x="358" y="495" fill="#c16a34" class="eyebrow">USER GATE 1</text>
    <text x="358" y="516" fill="#ede8dc" class="node-sub">approve brief direction</text>

    <!-- Planning agent -->
    <rect x="250" y="560" width="680" height="92" rx="8" fill="#07070a" stroke="rgba(237,232,220,0.72)" stroke-width="2.5"></rect>
    <text x="590" y="592" text-anchor="middle" fill="#c16a34" class="eyebrow">SUB-AGENT · PLANNING</text>
    <text x="590" y="624" text-anchor="middle" fill="#fff5d9" class="serif" font-size="28">Investigator</text>
    <text x="590" y="646" text-anchor="middle" fill="rgba(237,232,220,0.72)" class="node-sub">writes methodology.json</text>

    <!-- Methodology gate -->
    <rect x="300" y="682" width="580" height="64" rx="8" fill="rgba(193,106,52,0.14)" stroke="#c16a34" stroke-width="2.5"></rect>
    <circle cx="332" cy="714" r="10" fill="none" stroke="#4a7d3f" stroke-width="2.5"></circle>
    <path d="M326 714 l4 4 l9 -10" fill="none" stroke="#4a7d3f" stroke-width="2.5"></path>
    <text x="358" y="707" fill="#c16a34" class="eyebrow">USER GATE 2</text>
    <text x="358" y="730" fill="#ede8dc" class="node-sub">approve methodology · choose RLM if installed (2)</text>

    <!-- Execution loop -->
    <rect x="210" y="780" width="760" height="356" rx="12" fill="rgba(193,106,52,0.05)" stroke="#8a6212" stroke-width="2.5" stroke-dasharray="10 8"></rect>
    <text x="235" y="814" fill="#d9a65f" class="eyebrow">PHASE 3 · EXECUTION LOOP · MAX 5 CYCLES</text>

    <rect x="250" y="842" width="680" height="88" rx="8" fill="#07070a" stroke="rgba(237,232,220,0.72)" stroke-width="2.5"></rect>
    <text x="590" y="876" text-anchor="middle" fill="#c16a34" class="eyebrow">SUB-AGENT · EXECUTION</text>
    <text x="590" y="910" text-anchor="middle" fill="#fff5d9" class="serif" font-size="28">Investigator collects evidence</text>

    <rect x="250" y="964" width="680" height="88" rx="8" fill="#07070a" stroke="rgba(237,232,220,0.72)" stroke-width="2.5"></rect>
    <text x="590" y="998" text-anchor="middle" fill="#c16a34" class="eyebrow">SUB-AGENT · VERIFICATION</text>
    <text x="590" y="1032" text-anchor="middle" fill="#fff5d9" class="serif" font-size="28">Fact-checker verifies claims</text>

    <rect x="300" y="1082" width="580" height="54" rx="8" fill="#e3ddce" stroke="#8a6212" stroke-width="2.5"></rect>
    <text x="590" y="1104" text-anchor="middle" fill="#8a6212" class="eyebrow">READINESS CHECK</text>
    <text x="590" y="1126" text-anchor="middle" fill="#17140e" class="node-sub" font-weight="600">ready, or loop on gaps</text>

    <path d="M880 1110 C 1010 1110 1010 886 936 886" fill="none" stroke="#8a6212" stroke-width="3" stroke-dasharray="7 6" marker-end="url(#arrow-amber)"></path>
    <text x="1018" y="1002" fill="#d9a65f" class="callout" transform="rotate(90 1018 1002)">NEXT CYCLE</text>

    <!-- Gate 3 -->
    <rect x="300" y="1168" width="580" height="62" rx="8" fill="rgba(193,106,52,0.14)" stroke="#c16a34" stroke-width="2.5"></rect>
    <circle cx="332" cy="1199" r="10" fill="none" stroke="#4a7d3f" stroke-width="2.5"></circle>
    <path d="M326 1199 l4 4 l9 -10" fill="none" stroke="#4a7d3f" stroke-width="2.5"></path>
    <text x="358" y="1191" fill="#c16a34" class="eyebrow">USER GATE 3</text>
    <text x="358" y="1215" fill="#ede8dc" class="node-sub">approve findings · review.html</text>

    <!-- Report -->
    <rect x="250" y="1262" width="680" height="62" rx="8" fill="#e3ddce" stroke="rgba(237,232,220,0.30)" stroke-width="2.5"></rect>
    <text x="590" y="1287" text-anchor="middle" fill="#c16a34" class="eyebrow">PHASE 5</text>
    <text x="590" y="1312" text-anchor="middle" fill="#17140e" class="node-title">Draft report package</text>

    <!-- Ingest -->
    <rect x="250" y="1356" width="680" height="62" rx="8" fill="#e3ddce" stroke="rgba(237,232,220,0.30)" stroke-width="2.5"></rect>
    <text x="590" y="1381" text-anchor="middle" fill="#c16a34" class="eyebrow">PHASE 6</text>
    <text x="590" y="1406" text-anchor="middle" fill="#17140e" class="node-title">Ingest verified knowledge</text>

    <!-- Vault -->
    <rect x="410" y="1450" width="360" height="54" rx="27" fill="#ede8dc" stroke="rgba(237,232,220,0.28)" stroke-width="2"></rect>
    <text x="590" y="1484" text-anchor="middle" fill="#17140e" class="small" font-weight="600" letter-spacing="0.08em">VAULT · OBSIDIAN / DIRECTORY</text>

    <!-- Detail boxes -->
    <rect x="70" y="1540" width="500" height="96" rx="8" fill="rgba(237,232,220,0.05)" stroke="rgba(237,232,220,0.22)" stroke-width="2"></rect>
    <circle cx="105" cy="1574" r="16" fill="#e3ddce"></circle>
    <text x="105" y="1580" text-anchor="middle" fill="#17140e" font-size="15" font-weight="600">1</text>
    <text x="136" y="1568" fill="#c16a34" class="eyebrow">CHILD SKILLS</text>
    <text x="136" y="1594" fill="#ede8dc" class="node-sub">OSINT, grounding, shell safety, archiving,</text>
    <text x="136" y="1618" fill="#ede8dc" class="node-sub">review, report drafting, monitoring, ingest.</text>

    <rect x="610" y="1540" width="500" height="96" rx="8" fill="rgba(52,111,168,0.08)" stroke="#346fa8" stroke-width="2.5" stroke-dasharray="9 7"></rect>
    <circle cx="645" cy="1574" r="16" fill="#e3ddce"></circle>
    <text x="645" y="1580" text-anchor="middle" fill="#17140e" font-size="15" font-weight="600">2</text>
    <text x="676" y="1568" fill="#86b9e8" class="eyebrow">OPTIONAL LOCAL LEAD EXTRACTION</text>
    <text x="676" y="1594" fill="#ede8dc" class="node-sub">RLM runs only after methodology approval.</text>
    <text x="676" y="1618" fill="#ede8dc" class="node-sub">rlm-analysis.json is leads only.</text>
  </svg>
</body>
</html>
